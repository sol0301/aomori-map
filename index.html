<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아오모리 일정 지도</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #222;
    }

    .desc {
      margin: 0 0 18px;
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    #map {
      width: 100%;
      height: 720px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      background: #fff;
    }

    .leaflet-popup-content {
      font-size: 14px;
      line-height: 1.5;
    }

    .legend {
      margin-top: 14px;
      padding: 14px 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      font-size: 14px;
      color: #444;
      line-height: 1.8;
    }

    .legend strong {
      color: #111;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>아오모리 · 도와다 · 하코다테 일정 지도</h1>
    <p class="desc">
      간단 일정표 기준 이동 동선을 표시한 지도입니다.
    </p>

    <div id="map"></div>

    <div class="legend">
      <strong>일정 요약</strong><br>
      1일: 인천 → 아오모리<br>
      2일: 아오모리<br>
      3일: 아오모리 → 도와다 → 아오모리<br>
      4일: 아오모리 → 하코다테<br>
      5일: 하코다테 → 인천
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // 주요 지점 좌표
    const locations = [
      {
        name: "인천",
        lat: 37.4602,
        lng: 126.4407,
        day: "1일 / 5일",
        note: "출발 및 귀국"
      },
      {
        name: "아오모리",
        lat: 40.8222,
        lng: 140.7474,
        day: "1~4일",
        note: "주요 숙박 및 이동 거점"
      },
      {
        name: "도와다",
        lat: 40.6121,
        lng: 141.2057,
        day: "3일",
        note: "당일 이동 후 아오모리 복귀"
      },
      {
        name: "하코다테",
        lat: 41.7688,
        lng: 140.7288,
        day: "4~5일",
        note: "이동 후 귀국 출발"
      }
    ];

    // 실제 이동 순서 기준 라우트
    const route = [
      [37.4602, 126.4407], // 인천
      [40.8222, 140.7474], // 아오모리
      [40.6121, 141.2057], // 도와다
      [40.8222, 140.7474], // 아오모리 복귀
      [41.7688, 140.7288], // 하코다테
      [37.4602, 126.4407]  // 인천 귀국
    ];

    // 지도 생성
    const map = L.map('map');

    // 배경 지도
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CartoDB'
    }).addTo(map);

    // 마커 스타일용 커스텀 원형 아이콘 대체
    locations.forEach((loc, index) => {
      const marker = L.circleMarker([loc.lat, loc.lng], {
        radius: 9,
        color: '#0f5fa8',
        weight: 2,
        fillColor: '#1f78d1',
        fillOpacity: 0.9
      }).addTo(map);

      marker.bindPopup(`
        <strong>${loc.name}</strong><br>
        일정: ${loc.day}<br>
        설명: ${loc.note}
      `);
    });

    // 이동선
    const polyline = L.polyline(route, {
      color: '#c59a3d',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    // 날짜별 라벨 마커
    const dayPoints = [
      { lat: 40.8222, lng: 140.7474, label: "1일", text: "인천 → 아오모리" },
      { lat: 40.8222, lng: 140.7474, label: "2일", text: "아오모리" },
      { lat: 40.6121, lng: 141.2057, label: "3일", text: "아오모리 → 도와다 → 아오모리" },
      { lat: 41.7688, lng: 140.7288, label: "4일", text: "아오모리 → 하코다테" },
      { lat: 37.4602, lng: 126.4407, label: "5일", text: "하코다테 → 인천" }
    ];

    dayPoints.forEach(point => {
      L.marker([point.lat, point.lng], {
        icon: L.divIcon({
          className: 'custom-day-label',
          html: `
            <div style="
              background:#123c69;
              color:#fff;
              padding:6px 10px;
              border-radius:999px;
              font-size:12px;
              font-weight:700;
              white-space:nowrap;
              box-shadow:0 3px 10px rgba(0,0,0,0.15);
            ">
              ${point.label}
            </div>
          `,
          iconSize: [50, 24],
          iconAnchor: [25, 12]
        })
      }).addTo(map).bindPopup(`<strong>${point.label}</strong><br>${point.text}`);
    });

    // 화면에 전체 경로 맞추기
    map.fitBounds(polyline.getBounds(), {
      padding: [60, 60]
    });
  </script>
</body>
</html>
